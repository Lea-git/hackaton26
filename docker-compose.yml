services:

  # ─────────────────────────────
  # Backend Python
  # ─────────────────────────────
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/output:/app/output
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: admin1234
      MINIO_SECURE: "false"
      AIRFLOW_API_URL: "http://airflow-webserver:8080"
    depends_on:
      - minio

  # ─────────────────────────────
  # Frontend Laravel / Vue
  # ─────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/var/www/html
    environment:
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "admin1234"
      AIRFLOW_API_URL: "http://airflow-webserver:8080"
      AIRFLOW_USER: "admin"
      AIRFLOW_PASSWORD: "admin"
    depends_on:
      - db
      - minio
      - airflow-webserver

  # ─────────────────────────────
  # Base de données MySQL
  # ─────────────────────────────
  db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3006:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # MinIO (Data Lake)
  # ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio-datalake
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin1234
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # ─────────────────────────────
  # Initialisation MinIO (buckets)
  # ─────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint:
      /bin/sh -c "
        sleep 5 &&
        mc alias set local http://minio:9000 admin admin1234 &&
        mc mb --ignore-existing local/raw-documents &&
        mc mb --ignore-existing local/clean-documents &&
        mc mb --ignore-existing local/curated-documents &&
        echo '✅ Buckets créés'
      "
    restart: on-failure

  # ─────────────────────────────
  # Airflow - PostgreSQL (metadata)
  # ─────────────────────────────
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────
  # Airflow - Init DB + Admin User
  # ─────────────────────────────
  airflow-init:
    build: ./airflow
    container_name: airflow-init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: "ZmRza2xmanNka2xmanNkbGtmamRzbGtmamRzZmtqZHM="
      AIRFLOW__WEBSERVER__SECRET_KEY: "docuhack-secret-key"
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
      PYTHONPATH: "/opt/airflow:/opt/airflow/backend"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: admin1234
      MINIO_SECURE: "false"
      LARAVEL_API_URL: "http://frontend:80/api"
      GROUND_TRUTH_PATH: "/opt/airflow/backend/output/ground_truth.json"
      OCR_MODE: "real"
      MODEL_PATH: "/opt/airflow/model"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname DocuHack \
          --role Admin \
          --email admin@docuhack.local || true
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/tasks:/opt/airflow/docuhack_tasks
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./backend:/opt/airflow/backend
      - ./model:/opt/airflow/model

  # ─────────────────────────────
  # Airflow - Webserver
  # ─────────────────────────────
  airflow-webserver:
    build: ./airflow
    container_name: airflow-webserver
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/tasks:/opt/airflow/docuhack_tasks
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./backend:/opt/airflow/backend
      - ./model:/opt/airflow/model
    command: airflow webserver
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────
  # Airflow - Scheduler
  # ─────────────────────────────
  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/tasks:/opt/airflow/docuhack_tasks
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./backend:/opt/airflow/backend
      - ./model:/opt/airflow/model
    command: airflow scheduler
    restart: unless-stopped

volumes:
  minio_data:
  db_data:
  airflow_pg_data:
