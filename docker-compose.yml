version: "3.9"

services:

  # ─────────────────────────────────────────
  #  MinIO — Object Storage S3-compatible
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio-datalake
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web UI  →  http://localhost:9001
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin1234
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  mc (MinIO Client) — Initialisation
  #  Crée les 3 buckets au démarrage
  # ─────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        echo '⏳ Connexion à MinIO...' &&
        mc alias set local http://minio:9000 admin admin1234 &&

        echo '📦 Création des buckets...' &&
        mc mb --ignore-existing local/raw-documents &&
        mc mb --ignore-existing local/clean-documents &&
        mc mb --ignore-existing local/curated-documents &&

        echo '🔒 Application des politiques...' &&
        mc anonymous set none local/raw-documents &&
        mc anonymous set none local/clean-documents &&
        mc anonymous set none local/curated-documents &&

        echo '✅ Data Lake initialisé avec succès !' &&
        mc ls local
      "
    restart: on-failure

volumes:
  minio_data:
    driver: local
