services:

  # ─────────────────────────────
  # Backend Python
  # ─────────────────────────────
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/output:/app/output
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: admin1234
      MINIO_SECURE: "false"
    depends_on:
      - minio

  # ─────────────────────────────
  # Frontend Laravel / Vue
  # ─────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/var/www/html
    depends_on:
      - backend
      - db

  # ─────────────────────────────
  # Base de données MySQL
  # ─────────────────────────────
  db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # MinIO (Data Lake)
  # ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio-datalake
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin1234
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # ─────────────────────────────
  # Initialisation MinIO (buckets)
  # ─────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: 
      /bin/sh -c "
        sleep 5 &&
        mc alias set local http://minio:9000 admin admin1234 &&
        mc mb --ignore-existing local/raw-documents &&
        mc mb --ignore-existing local/clean-documents &&
        mc mb --ignore-existing local/curated-documents &&
        echo '✅ Buckets créés'
      "
    restart: on-failure

volumes:
  minio_data:
  db_data: